<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>THE CORE · swarm proof</title>
<style>
  :root{--amber:#ffb000;--dim:#c98700;--mid:#8a5e00;--faint:#5e3f00;--err:#ff5050;--green:#76e08a;--cyan:#49d2ff;--bg:#05060a;}
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--amber);font-family:'Consolas','SF Mono','Menlo',monospace;}
  #field{position:fixed;inset:0;width:100vw;height:100vh;display:block;background:var(--bg);}
  b{font-weight:600;} .dim{color:var(--dim);}
  /* top bar */
  #topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:7px 13px;
    background:linear-gradient(#080a12ee,#080a12aa);border-bottom:1px solid #1a2030;font-size:12px;z-index:9;}
  .brand{font-size:13px;letter-spacing:3px;}
  .stat{display:flex;align-items:center;gap:6px;color:var(--mid);font-size:10px;letter-spacing:1px;}
  .stat b{color:var(--amber);font-size:12px;letter-spacing:0;}
  .stat.compute b{color:var(--cyan);font-size:15px;}
  .track{width:78px;height:6px;background:#141824;position:relative;overflow:hidden;}
  .track i{position:absolute;left:0;top:0;bottom:0;background:var(--amber);transition:width .12s linear;}
  .spacer{flex:1;}
  .btn{background:#0d1018;border:1px solid var(--faint);color:var(--dim);font-family:inherit;font-size:11px;letter-spacing:1px;padding:5px 11px;cursor:pointer;}
  .btn:hover{border-color:var(--amber);color:var(--amber);}
  /* left build rail */
  #rail{position:fixed;left:11px;top:124px;width:216px;display:flex;flex-direction:column;gap:7px;z-index:5;max-height:calc(100vh - 188px);overflow-y:auto;padding-right:4px;}
  #rail::-webkit-scrollbar{width:5px;} #rail::-webkit-scrollbar-thumb{background:#2a2410;}
  .group{display:flex;flex-direction:column;gap:6px;}
  .glabel{font-size:9px;letter-spacing:2px;color:var(--mid);padding-left:1px;}
  .act{display:flex;flex-direction:column;align-items:flex-start;gap:1px;background:#0b0e16ee;border:1px solid var(--faint);border-left:3px solid var(--c,#ffb000);
    color:var(--dim);font-family:inherit;padding:5px 9px;cursor:pointer;text-align:left;width:100%;}
  .act:hover{border-color:var(--amber);}
  .act.owned{background:rgba(255,176,0,.07);}
  .act.owned .n::after{content:' ✓';color:var(--green);}
  .act .n{font-size:11px;letter-spacing:1px;color:var(--c,var(--amber));}
  .act .d{font-size:8.5px;color:var(--mid);}
  .act .c{font-size:11px;color:var(--cyan);}
  .act.noafford{opacity:.45;}
  /* segmented (stance) */
  .seg{display:flex;border:1px solid var(--faint);}
  .seg button{flex:1;background:#0b0e16;border:0;border-right:1px solid var(--faint);color:var(--mid);font-family:inherit;font-size:10px;letter-spacing:1px;padding:6px 0;cursor:pointer;}
  .seg button:last-child{border-right:0;}
  .seg button.on{background:rgba(255,176,0,.16);color:var(--amber);}
  /* compute-allocation dial */
  .dial{display:flex;align-items:stretch;gap:6px;background:#0b0e16ee;border:1px solid var(--faint);border-left:3px solid var(--c,#ffb000);padding:6px 7px;}
  .dialbtn{width:30px;flex:none;background:#11151f;border:1px solid var(--faint);color:var(--c,var(--amber));font-family:inherit;font-size:17px;line-height:1;cursor:pointer;border-radius:2px;}
  .dialbtn:active{background:rgba(255,176,0,.18);}
  .dialmid{flex:1;display:flex;flex-direction:column;gap:3px;justify-content:center;min-width:0;}
  .dialrow{display:flex;justify-content:space-between;align-items:baseline;}
  .dialname{font-size:11px;letter-spacing:1px;color:var(--c,var(--amber));}
  .dialpct{font-size:12px;color:var(--amber);font-variant-numeric:tabular-nums;}
  .dialbar{height:5px;background:#141824;position:relative;overflow:hidden;}
  .dialbar i{position:absolute;left:0;top:0;bottom:0;width:34%;background:var(--c,var(--amber));transition:width .12s linear;}
  .dialsub{font-size:8px;color:var(--mid);}
  .ocbtn{color:#ffd24a;}
  .dial.ocburst{border-color:#ffd24a;box-shadow:0 0 14px rgba(255,210,74,.45);}
  .dial.ocburst .dialname::after{content:' ⚡ OVERCLOCK';color:#ffe27a;font-size:8px;letter-spacing:1px;}
  .dial.ocbrown{opacity:.55;}
  .dial.ocbrown .dialname::after{content:' ▼ BROWNOUT';color:#ff9e6b;font-size:8px;letter-spacing:1px;}
  .dial.ocbtn-hot .ocbtn{color:#ff5a6a;}
  .ocheat{display:flex;align-items:center;gap:7px;font-size:8px;letter-spacing:2px;color:var(--mid);padding:0 2px;}
  .ocheatbar{flex:1;height:4px;background:#141824;position:relative;overflow:hidden;}
  .ocheatbar i{position:absolute;left:0;top:0;bottom:0;width:0;background:#ffd24a;transition:width .15s linear;}
  .dial.countered{border-color:#ff5a6a;box-shadow:0 0 10px rgba(255,90,106,.25);}
  .dial.countered .dialname::after{content:' ⚠ COUNTERED';color:#ff7a86;font-size:8px;letter-spacing:1px;}
  /* threat-read telegraph banner */
  #threatread{position:fixed;top:46px;left:50%;transform:translateX(-50%);max-width:min(420px,90vw);z-index:8;
    background:rgba(40,10,12,.92);border:1px solid #ff5a6a;color:#ffb0b6;font-size:10.5px;letter-spacing:.5px;
    padding:7px 13px;text-align:center;border-radius:3px;box-shadow:0 0 16px rgba(255,90,106,.3);animation:tr-pulse 1.3s ease-in-out infinite;}
  @keyframes tr-pulse{0%,100%{opacity:.78;}50%{opacity:1;}}
  /* exotic toggles */
  #exrail{position:fixed;right:11px;top:124px;width:182px;display:flex;flex-direction:column;gap:6px;z-index:5;max-height:calc(100vh - 188px);overflow-y:auto;}
  body.ui-hidden #rail, body.ui-hidden #exrail, body.ui-hidden #log, body.ui-hidden #hero, body.ui-hidden .legend{display:none;}
  body.ui-hidden #hideui{color:var(--amber);border-color:var(--amber);}
  .ex{display:flex;flex-direction:column;gap:1px;background:#0b0e16ee;border:1px dashed #5a4a8a;color:#a99adf;font-family:inherit;padding:7px 9px;cursor:pointer;text-align:left;}
  .ex:hover{border-color:#b9a8ff;}
  .ex.on{border-style:solid;border-color:#b9a8ff;background:rgba(150,120,255,.15);color:#cdbcff;box-shadow:0 0 9px rgba(150,120,255,.25);}
  .ex .n{font-size:10.5px;letter-spacing:1px;}
  .ex .d{font-size:8.5px;color:#8a7ec0;}
  .extag{font-size:8px;letter-spacing:2px;color:#7a6cb0;margin-bottom:1px;}
  /* log + hero readout */
  .lean{color:var(--cyan)!important;font-size:13px!important;letter-spacing:1px;}
  .lean.countered{color:var(--err)!important;}
  /* bottom bar — pod status + a short log, anchored to the bottom edge */
  #bottombar{position:fixed;left:0;right:0;bottom:0;z-index:6;display:flex;flex-direction:column;gap:4px;padding:6px 11px calc(7px + env(safe-area-inset-bottom));
    background:linear-gradient(#080a1200,#080a12cc 38%);pointer-events:none;}
  #hero{display:flex;flex-wrap:wrap;gap:5px 12px;color:var(--dim);font-size:10px;}
  #hero .hn{color:var(--mid);letter-spacing:1px;} #hero .hn b{color:var(--amber);}
  #log{max-height:62px;overflow:hidden;color:var(--mid);font-size:9.5px;line-height:1.45;}
  #log div:last-child{color:var(--dim);}
  /* overlay */
  /* research draft */
  #draft{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:flex-start;gap:10px;background:rgba(5,6,10,0.93);z-index:12;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:5vh 14px calc(5vh + env(safe-area-inset-bottom));}
  .draft-h{font-size:19px;letter-spacing:6px;color:var(--amber);margin-top:auto;}
  .draft-sub{font-size:10.5px;color:var(--dim);letter-spacing:1px;text-align:center;line-height:1.4;}
  #draft-cards{display:flex;flex-direction:column;gap:9px;margin:6px 0 auto;width:min(440px,94vw);}
  .draftcard{width:100%;background:#0b0e16;border:1px solid var(--faint);border-left:3px solid var(--c,#ffb000);color:var(--dim);font-family:inherit;text-align:left;padding:11px 14px;cursor:pointer;display:flex;flex-direction:column;gap:3px;transition:border-color .1s,box-shadow .1s;}
  .draftcard:active{border-color:var(--c);box-shadow:0 0 16px -3px var(--c);}
  .draftcard.sig{border-color:#7a6a2a;background:linear-gradient(100deg,rgba(255,226,122,.10),rgba(11,14,22,.6));box-shadow:0 0 14px -4px var(--c);}
  .draftcard.sig .dc-tag{color:var(--c);}
  .dc-tag{font-size:8px;letter-spacing:2px;color:var(--mid);}
  .dc-name{font-size:15px;letter-spacing:1px;color:var(--c);}
  .dc-desc{font-size:10.5px;color:var(--dim);line-height:1.4;}
  .dc-cost{font-size:12px;color:var(--cyan);}
  #overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:rgba(5,6,10,0.86);z-index:10;}
  #ov-title{font-size:30px;letter-spacing:8px;}
  #overlay.win #ov-title{color:var(--green);text-shadow:0 0 16px rgba(118,224,138,.5);}
  #overlay.lose #ov-title{color:var(--err);text-shadow:0 0 16px rgba(255,80,80,.5);}
  #ov-sub{font-size:12px;color:var(--dim);}
</style></head><body>
<canvas id="field"></canvas>

<div id="topbar">
  <div class="stat">CORE <b id="corehp">100</b><div class="track"><i id="corebar"></i></div></div>
  <div class="stat">SURGE <b id="surge">0 / 6</b></div>
  <div class="stat">LEAN <b id="lean" class="lean">BALANCED</b></div>
  <span class="spacer"></span>
  <button id="zoomout" class="btn" title="zoom out">−</button>
  <button id="zoomin" class="btn" title="zoom in">+</button>
  <button id="recenter" class="btn" title="recenter on core">◎</button>
  <button id="mode" class="btn">MODE: LANES</button>
  <button id="reseed" class="btn">⟳ new node</button>
</div>

<div id="threatread" hidden></div>

<div id="bottombar">
  <div id="hero"></div>
  <div id="log"></div>
</div>

<div id="draft">
  <div class="draft-h" id="draft-h">CHOOSE ONE</div>
  <div class="draft-sub" id="draft-sub">a make-or-break pick — reshape your build. the board is paused.</div>
  <div id="draft-cards"></div>
</div>
<div id="overlay"><div id="ov-title"></div><div id="ov-sub"></div><button id="reseed2" class="btn" onclick="document.getElementById('reseed').click()">⟳ new node</button></div>

<script src="sim.js"></script>
<script src="app.js"></script>
</body></html>
