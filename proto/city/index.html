<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>THE CITY · proof</title>
<style>
  :root{--amber:#ffb000;--dim:#c98700;--mid:#8a5e00;--faint:#6a4500;--err:#ff5050;--bg:#070504;}
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--amber);font-family:'Consolas','SF Mono','Menlo',monospace;}
  #map{position:fixed;inset:0;width:100vw;height:100vh;display:block;cursor:crosshair;touch-action:none;}
  .dim{color:var(--dim);} b{font-weight:600;}
  /* top bar */
  #topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:7px 12px;background:linear-gradient(#0a0805ee,#0a0805aa);border-bottom:1px solid #2a2410;font-size:12px;z-index:5;}
  .brand{font-size:13px;letter-spacing:3px;}
  .stat{display:flex;align-items:center;gap:6px;color:var(--mid);font-size:10px;letter-spacing:1px;}
  .stat b{color:var(--amber);font-size:12px;letter-spacing:0;}
  .track{width:64px;height:5px;background:#1c1810;position:relative;overflow:hidden;}
  .track i{position:absolute;left:0;top:0;bottom:0;background:var(--amber);transition:width .15s linear;}
  .spacer{flex:1;}
  .mini{background:#140f06;border:1px solid var(--faint);color:var(--dim);font-family:inherit;font-size:12px;padding:4px 10px;cursor:pointer;}
  .mini:hover{border-color:var(--amber);color:var(--amber);}
  #goal{position:fixed;top:38px;left:12px;display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:2px;color:var(--mid);z-index:5;}
  #goal .track.big{width:160px;height:4px;}
  #goal .track.big i{background:#6ee06e;}
  /* hunt warning */
  #hunt{position:fixed;top:64px;left:50%;transform:translateX(-50%);display:none;z-index:6;
    background:#2a0c0c;border:1px solid var(--err);color:#ff9a9a;font-size:11px;letter-spacing:.5px;padding:7px 14px;
    animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{50%{box-shadow:0 0 14px rgba(255,80,80,.5);}}
  /* panels */
  .panel{position:fixed;background:#0c0a06ee;border:1px solid #2a2410;font-size:12px;z-index:5;}
  #inspector{right:12px;bottom:12px;width:300px;padding:13px;line-height:1.5;}
  #inspector .ititle{font-size:15px;margin-bottom:5px;}
  #inspector .verbs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:11px;}
  .vb{background:rgba(255,176,0,.07);border:1px solid var(--amber);color:var(--amber);font-family:inherit;
    font-size:11px;letter-spacing:1px;padding:8px 6px;cursor:pointer;display:flex;justify-content:center;gap:5px;align-items:center;}
  .vb:hover{background:rgba(255,176,0,.16);}
  .vb .c{color:var(--mid);font-size:9px;}
  .vb.off{border-color:var(--faint);color:var(--mid);opacity:.5;cursor:default;background:transparent;}
  .vb.cover{background:rgba(110,224,110,.06);border-color:#6ee06e;color:#9ef09e;padding:5px 11px;}
  /* ability bar (the arsenal — arm a verb, then target) */
  #abilitybar{position:fixed;left:12px;top:64px;width:186px;background:#0c0a06ee;border:1px solid #2a2410;padding:9px;z-index:5;}
  .ab-title{font-size:9px;letter-spacing:3px;color:var(--mid);margin-bottom:8px;}
  .ab-foot{font-size:8.5px;color:var(--faint);letter-spacing:.5px;margin-top:8px;font-style:italic;}
  .ab{display:flex;align-items:center;gap:8px;width:100%;background:transparent;border:1px solid var(--faint);color:var(--dim);
    font-family:inherit;font-size:11px;letter-spacing:1px;padding:7px 9px;margin:4px 0;cursor:pointer;text-align:left;}
  .ab:hover{border-color:var(--amber);color:var(--amber);}
  .ab .abk{width:14px;text-align:center;color:var(--mid);}
  .ab .abn{flex:1;}
  .ab .abc{font-size:9px;color:var(--mid);}
  .ab.armed{border-color:var(--amber);color:var(--amber);background:rgba(255,176,0,.12);box-shadow:0 0 8px rgba(255,176,0,.25);}
  .ab.armed .abk{color:var(--amber);}
  .ab.noafford{opacity:.45;}
  #armedhint{position:fixed;top:98px;left:50%;transform:translateX(-50%);display:none;z-index:6;
    background:#140f06;border:1px solid var(--amber);color:var(--amber);font-size:11px;letter-spacing:1px;padding:6px 14px;}
  /* infobox action (preview + USE) */
  .action{margin-top:11px;border-top:1px solid #2a2410;padding-top:10px;}
  .alabel{font-size:10px;letter-spacing:2px;color:var(--amber);margin-bottom:4px;}
  .apreview{font-size:11px;color:var(--dim);line-height:1.45;margin-bottom:9px;}
  .apreview.bad{color:#c77;}
  .use{width:100%;background:rgba(255,176,0,.10);border:1px solid var(--amber);color:var(--amber);font-family:inherit;
    font-size:12px;letter-spacing:3px;padding:9px;cursor:pointer;}
  .use:hover{background:rgba(255,176,0,.2);}
  .use.off{border-color:var(--faint);color:var(--mid);background:transparent;cursor:default;}
  .use.glob{border-color:#6ee06e;color:#9ef09e;background:rgba(110,224,110,.08);}
  #log{left:12px;bottom:12px;width:300px;max-height:120px;overflow-y:auto;padding:9px 11px;color:var(--dim);font-size:10.5px;line-height:1.55;}
  #log div{margin:1px 0;} #log div:last-child{color:var(--amber);}
  .legend{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);font-size:9px;color:var(--faint);letter-spacing:1px;z-index:5;display:flex;gap:12px;}
  @media(max-width:680px){ #inspector{width:46vw;} #log{width:48vw;max-height:110px;} .stat{font-size:9px;} }
</style></head><body>
<canvas id="map"></canvas>
<div id="topbar">
  <span class="brand">◈ THE CITY<span class="dim" style="letter-spacing:1px"> · proof</span></span>
  <div class="stat">CASH <b id="cash">$0</b></div>
  <div class="stat">COMPUTE <b id="compute">0</b><div class="track"><i id="computebar"></i></div></div>
  <div class="stat">TRACE <b id="trace">0%</b><div class="track"><i id="tracebar"></i></div></div>
  <div class="stat">NODES <b id="owned">1</b></div>
  <div class="stat">SAT <b id="sat">0%</b></div>
  <span class="spacer"></span>
  <button id="zout" class="mini">−</button><button id="zin" class="mini">+</button><button id="reseed" class="mini">⟳ new city</button>
</div>
<div id="goal"><span>AMASS $5,000</span><div class="track big"><i id="goalbar"></i></div></div>
<div id="hunt">⚠ TRACEBACK ACTIVE — something is following your network home. COVER to break the trail.</div>
<div id="armedhint"></div>
<div id="abilitybar"><div class="ab-title">ABILITIES</div><div id="ablist"></div><div class="ab-foot">more come online as you grow</div></div>
<div id="inspector" class="panel"></div>
<div id="log" class="panel"></div>
<div class="legend"><span>1 · arm an ability ◂</span><span>2 · pick a target</span><span>3 · USE</span><span style="color:var(--err)">red wash = hot district</span></div>
<script src="sim.js"></script>
<script src="app.js"></script>
</body></html>
